<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TecAmigo - Suporte de TI em Pelotas</title>

<meta name="description" content="Suporte técnico em informática, internet, formatação, redes e segurança em Pelotas - RS">

<style>
:root{
    --bg:#0b1220;
    --card:#111a2e;
    --card2:#0f1a33;
    --primary:#4da3ff;
    --text:#e6f0ff;
    --muted:#a9b7d0;
    --accent:#00d4ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    overflow-x:hidden;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:25px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:60px;
    height:60px;
    border-radius:12px;
}

.logo h1{
    font-size:26px;
}

.badge{
    color:var(--muted);
    font-size:14px;
}

/* CARD */
.card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    padding:20px;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* GRID SERVICES */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
    margin-top:20px;
}

.service{
    background:#16223d;
    padding:15px;
    border-radius:12px;
    text-align:center;
    transition:0.2s;
}

.service:hover{
    transform:scale(1.05);
    background:#1b2a4d;
}

.service span{
    display:block;
    margin-top:8px;
    font-size:14px;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 16px;
    background:var(--primary);
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    text-align:center;
}

.btn:hover{
    background:#2f8cff;
}

/* RESPONSIVO */
@media(max-width:600px){
    .logo h1{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
            <div>
                <h1>TecAmigo</h1>
                <div class="badge">Suporte de TI • Pelotas - RS</div>
            </div>
        </div>
    </div>

    <div class="card">

        <h2>🔧 Computador & Software</h2>
        <p style="color:var(--muted);margin-top:5px;">
            Soluções completas para problemas de informática
        </p>

        <div class="grid">

            <div class="service">💻<span>Computador lento</span></div>
            <div class="service">🌐<span>Internet ruim</span></div>
            <div class="service">🧹<span>Limpeza sistema</span></div>
            <div class="service">⚙️<span>Formatação</span></div>
            <div class="service">📶<span>Wi-Fi</span></div>
            <div class="service">🖨️<span>Impressoras</span></div>

        </div>

        <a class="btn" href="https://wa.me/5553999999999" target="_blank">
            💬 Chamar no WhatsApp
        </a>

    </div>

</div>

</body>
</html>
